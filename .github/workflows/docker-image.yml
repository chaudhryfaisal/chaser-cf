name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag (defaults to git SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_SHA::7}"
          fi

          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }} \
            -t ${{ steps.meta.outputs.image }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.meta.outputs.image }}:latest
